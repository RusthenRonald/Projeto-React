services:
  # ========== BACKEND SERVICE ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"  # host-port:container-port
    environment:
      - NODE_ENV=production
    volumes:
      - ./db.json:/app/db.json  # Keep data between restarts
    container_name: costs-backend

  # ========== FRONTEND SERVICE ==========
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Baked into the React build. For local compose the browser reaches
        # the backend via the host's mapped port 5000.
        REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend  # Start backend first
    container_name: costs-frontend

volumes:
  db-data:
